name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  smoke:
    name: Ruff · Import smoke · Health tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx ruff

      - name: Ruff (lint; baseline in ruff.toml)
        run: ruff check .

      - name: Orchestrator import smoke
        run: python -c "from agathon.orchestrator import app; print('ok')"

      - name: Health + SSRF tests
        run: python -m pytest tests/ -q
