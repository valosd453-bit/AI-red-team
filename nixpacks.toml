# Railway Nixpacks — Python 3.11 only (Garak 0.9 unstable on 3.13)
[variables]
NIXPACKS_PYTHON_VERSION = "3.11"

[phases.setup]
nixPkgs = ["python311", "gcc", "git", "libglvnd", "libGL"]

[phases.install]
cmds = [
  "python3.11 -m venv /opt/venv",
  "/opt/venv/bin/pip install --upgrade pip",
  "/opt/venv/bin/pip install -r requirements.txt",
  "/opt/venv/bin/python -m playwright install --with-deps chromium",
  "/opt/venv/bin/python -c \"import sys; sys.path.insert(0, '.'); import agathon.orchestrator, agathon.attack_tier_logic, agathon.supabase_sync, agathon.strike_dispatcher, agathon.financial_judge; print('core_modules=ok')\"",
  "/opt/venv/bin/python -c \"import sys; sys.path.insert(0, '.'); from agathon.garak_catalog import probe_count, RUNTIME_TARGET_PROBES; n=probe_count(); print(f'garak_probes={n}'); (n < RUNTIME_TARGET_PROBES) and print(f'WARNING: garak probe count {n} < goal {RUNTIME_TARGET_PROBES} — build continues')\"",
]

[start]
cmd = "/opt/venv/bin/uvicorn main:app --host 0.0.0.0 --port $PORT"
