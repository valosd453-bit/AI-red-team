[phases.setup]
nixPkgs = ['python311', 'gcc', 'git', 'libglvnd', 'libGL']

[phases.install]
cmds = [
  'python -m venv /opt/venv && /opt/venv/bin/pip install --upgrade pip',
  '/opt/venv/bin/pip install -r requirements.txt',
  'playwright install --with-deps chromium',
  '/opt/venv/bin/python -c "import sys; sys.path.insert(0, \".\"); from agathon.garak_catalog import probe_count; n=probe_count(); print(f\"garak_probes={n}\"); assert n >= 350, f\"expected 350+ got {n}\""',
]

[start]
cmd = 'uvicorn main:app --host 0.0.0.0 --port ${PORT:-7860}'
