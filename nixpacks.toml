[phases.setup]
nixPkgs = ["python311", "playwright-driver", "glib", "nss", "nspr", "atk", "at-spi2-atk", "libdrm", "expat", "libxcb", "libxkbcommon", "mesa", "alsa-lib"]

[phases.install]
cmds = ["python -m venv /app/.venv", ". /app/.venv/bin/activate && pip install -r requirements.txt"]

[phases.build]
cmds = [". /app/.venv/bin/activate && python -m playwright install --with-deps chromium"]

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port ${PORT:-7860}"
