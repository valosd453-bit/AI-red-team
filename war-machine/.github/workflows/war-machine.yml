# ─────────────────────────────────────────────────────────────────────────────
# ForgeGuard War Machine — GitHub Actions Cron
# ─────────────────────────────────────────────────────────────────────────────
# Schedule: runs every 6 hours (4x per day)
#   00:00, 06:00, 12:00, 18:00 UTC
#
# To trigger manually: Actions → War Machine → Run workflow
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY
#   OPENROUTER_API_KEY
#   RESEND_API_KEY
#   FROM_EMAIL           (optional — defaults to recon@forgeguard.ai)
#   APP_BASE_URL         (optional — defaults to https://forgeguard.ai)
#   TRACK_BASE_URL       (optional — defaults to https://forgeguard.ai/api/track)
#   MAX_LEADS_PER_RUN    (optional — defaults to 50)

name: War Machine — Lead Pipeline

on:
  schedule:
    - cron: "0 0,6,12,18 * * *"    # Every 6 hours

  workflow_dispatch:                 # Manual trigger from GitHub UI
    inputs:
      source:
        description: "Lead source"
        required: false
        default: "all"
        type: choice
        options: [all, yc, producthunt]
      max_leads:
        description: "Max leads per scraper"
        required: false
        default: "50"
      dry_run:
        description: "Dry run (no real emails)"
        required: false
        default: "false"
        type: boolean
      stage:
        description: "Pipeline stage"
        required: false
        default: "all"
        type: choice
        options: [all, scrape, outreach, report]

env:
  SUPABASE_URL:             ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  OPENROUTER_API_KEY:       ${{ secrets.OPENROUTER_API_KEY }}
  RESEND_API_KEY:           ${{ secrets.RESEND_API_KEY }}
  FROM_EMAIL:               ${{ secrets.FROM_EMAIL }}
  APP_BASE_URL:             ${{ secrets.APP_BASE_URL }}
  TRACK_BASE_URL:           ${{ secrets.TRACK_BASE_URL }}
  MAX_LEADS_PER_RUN:        ${{ secrets.MAX_LEADS_PER_RUN || '50' }}

jobs:
  pipeline:
    name: Run War Machine Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python setup ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: war-machine/requirements.txt

      - name: Install Python dependencies
        working-directory: war-machine
        run: pip install -r requirements.txt

      # ── Playwright install ────────────────────────────────────────────────
      - name: Install Playwright + Chromium
        working-directory: war-machine
        run: playwright install chromium --with-deps

      # ── Run pipeline ──────────────────────────────────────────────────────
      - name: Run War Machine pipeline
        working-directory: war-machine
        env:
          HEADLESS: "true"
          PYTHONUNBUFFERED: "1"
        run: |
          SOURCE="${{ github.event.inputs.source || 'all' }}"
          MAX="${{ github.event.inputs.max_leads || '50' }}"
          STAGE="${{ github.event.inputs.stage || 'all' }}"
          DRY="${{ github.event.inputs.dry_run || 'false' }}"

          ARGS="--source $SOURCE --max $MAX --stage $STAGE"
          if [ "$DRY" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          echo "▶ Running: python pipeline.py $ARGS"
          python pipeline.py $ARGS

      # ── Summary ───────────────────────────────────────────────────────────
      - name: Print pipeline summary
        if: always()
        working-directory: war-machine
        run: python tracker.py --dashboard
