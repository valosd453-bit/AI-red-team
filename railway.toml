# ForgeGuard Agathon engine — Railway config-as-code
# https://docs.railway.com/reference/config-as-code

[build]
builder = "RAILPACK"
buildCommand = "pip install -r requirements.txt && pip install -r requirements-arsenal.txt --no-deps && playwright install chromium --with-deps"

[build.env]
MISE_PYTHON_GITHUB_ATTESTATIONS = "false"
RAILPACK_PYTHON_VERSION = "3.11"
PIP_DEFAULT_TIMEOUT = "120"

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 120
